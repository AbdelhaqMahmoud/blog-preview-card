<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>
  <link rel="stylesheet" href="style.css">
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  
</head>
<body>
<main>
  <article class="card">
    <img src="./assets/images/illustration-article.svg" alt="Card Banner" class="card-img">
    <div class="card-content">
      <span class="badg">Learning</span>
      <p class="date"> Published 21 Des 2023</p>
      <h1 class="title"><a href="#"> HTML & CSS foundations</a></h1>
      <p class="description"> These language are the backbone of every website, defining structure, content, and presentation.</p>
    </div>
    <div class="author">
      <img src="./assets/images/image-avatar.webp" alt="Greg Hooper" class="avatar-img">
      <span class="author-name">Greg Hooper</span>
    </div>
  </article>
</main>

</html>
